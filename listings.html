<script>
// Load featured properties
function waitForGPGA(cb){if(window.GPGA&&window.GPGA.settings){cb(window.GPGA);return;}var a=0,t=setInterval(function(){a++;if(window.GPGA&&window.GPGA.settings){clearInterval(t);cb(window.GPGA);}else if(a>80)clearInterval(t);},50);}
waitForGPGA(async function(g){
  var grid=document.getElementById('sb-featured-grid');if(!grid)return;
  try{
    var r=await fetch(g.SB_URL+'/rest/v1/properties?featured=eq.true&order=created_at.desc&limit=3',{headers:g.H});
    var props=await r.json();
    if(!props||!props.length){
      r=await fetch(g.SB_URL+'/rest/v1/properties?order=created_at.desc&limit=3',{headers:g.H});
      props=await r.json();
    }
    if(!props||!props.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-3)"><p>No properties listed yet. Check back soon!</p></div>';return;}
    var tl={'single-family':'Single-Family','condo':'Condo/Townhome','multi-family':'Multi-Family','commercial':'Commercial','land':'Land/Lot'};
    var sl={'available':'Available','pending':'Pending','sold':'Sold'};
    grid.innerHTML=props.map(function(p){
      var st=p.status||'available';
      var price=st==='sold'?'<span style="color:var(--text-3);font-size:14px;font-style:italic">Sold</span>':(p.price?'$'+Number(p.price).toLocaleString():'Contact Us');
      var imgs=p.images&&p.images.length?p.images:null;
      var imgBlock=imgs?buildSlider(imgs):'<div class="placeholder">🏠</div>';
      var badge=st==='sold'?'badge-sold':st==='pending'?'badge-pending':'badge-available';
      return '<div class="gpga-prop-card"><div class="gpga-prop-card-img" style="position:relative">'+imgBlock+'<span class="gpga-prop-badge '+badge+'" style="z-index:6">'+sl[st]+'</span></div><div class="gpga-prop-card-body"><div class="gpga-prop-type">'+(tl[p.property_type]||p.property_type||'')+'</div><h3><a href="listings.html">'+p.title+'</a></h3><p class="gpga-prop-city">'+(p.address?p.address+', ':'')+p.city+(p.zip?', GA '+p.zip:'')+'</p><div class="gpga-prop-price">'+price+'</div><div class="gpga-prop-details">'+(p.bedrooms?'<span>🛏 '+p.bedrooms+' Bed</span>':'')+(p.bathrooms?'<span>🚿 '+p.bathrooms+' Bath</span>':'')+(p.sqft?'<span>📐 '+Number(p.sqft).toLocaleString()+' sqft</span>':'')+'</div>'+(st==='available'?'<a href="contact.html" class="gpga-btn gpga-btn-dark gpga-btn-sm gpga-btn-block">Inquire Now</a>':'')+'</div></div>';
    }).join('');
    document.querySelectorAll('.prop-slider').forEach(initSlider);
  }catch(e){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-3)">Unable to load properties.</div>';}
});
function buildSlider(imgs){var c=imgs.length;return'<div class="prop-slider" data-count="'+c+'"><div class="prop-slider-track">'+imgs.map(u=>'<img src="'+u+'" loading="lazy">').join('')+'</div><button class="prop-slider-btn prev">&#8249;</button><button class="prop-slider-btn next">&#8250;</button><div class="prop-slider-dots">'+imgs.map((_,i)=>'<button class="prop-slider-dot'+(i===0?' active':'')+'"></button>').join('')+'</div></div>';}
function initSlider(s){var tk=s.querySelector('.prop-slider-track'),dots=s.querySelectorAll('.prop-slider-dot'),c=parseInt(s.dataset.count)||1,cur=0;function go(n){cur=(n+c)%c;tk.style.transform='translateX(-'+(cur*100)+'%)';dots.forEach((d,i)=>d.classList.toggle('active',i===cur));}s.querySelector('.prop-slider-btn.prev')?.addEventListener('click',e=>{e.stopPropagation();go(cur-1);});s.querySelector('.prop-slider-btn.next')?.addEventListener('click',e=>{e.stopPropagation();go(cur+1);});dots.forEach((d,i)=>d.addEventListener('click',e=>{e.stopPropagation();go(i);}));var sx=0;s.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});s.addEventListener('touchend',e=>{var dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>40)go(dx<0?cur+1:cur-1);},{passive:true});}
</script>
